ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true

    transform_time_offset: 0.0
    transform_timeout: 0.1

    print_diagnostics: true
    debug: false

    publish_tf: true
    publish_acceleration: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # --------------------------------------------------------------------------
    # RADODOMETRIE
    # --------------------------------------------------------------------------
    odom0: /odom
    odom0_queue_size: 20
    odom0_differential: false
    odom0_relative: false

    # Reihenfolge:
    # x, y, z,
    # roll, pitch, yaw,
    # vx, vy, vz,
    # vroll, vpitch, vyaw,
    # ax, ay, az
    #
    # Fusioniert werden:
    # vx   aus Radodometrie
    # vy   aus Radodometrie
    # vyaw aus Radodometrie
    odom0_config: [
      false, false, false,
      false, false, false,
      true,  true,  false,
      false, false, true,
      false, false, false
    ]

    odom0_pose_rejection_threshold: 5.0
    odom0_twist_rejection_threshold: 2.0

    # --------------------------------------------------------------------------
    # IMU
    # --------------------------------------------------------------------------
    imu0: /imu/data
    imu0_queue_size: 50

    # Bei reiner angular_velocity.z-Fusion nicht differential/relative verwenden.
    # Diese Parameter sind vor allem für Pose-/Orientation-Anteile relevant.
    imu0_differential: false
    imu0_relative: false

    # Ist aktuell egal, da keine lineare Beschleunigung fusioniert wird.
    # Kann so bleiben.
    imu0_remove_gravitational_acceleration: true

    # Reihenfolge:
    # x, y, z,
    # roll, pitch, yaw,
    # vx, vy, vz,
    # vroll, vpitch, vyaw,
    # ax, ay, az
    #
    # Fusioniert wird nur:
    # vyaw = angular_velocity.z
    #
    # Keine absolute IMU-Orientation fusionieren.
    # Kein yaw aus Magnetometer/Heading fusionieren.
    imu0_config: [
      false, false, false,
      false, false, false,
      false, false, false,
      false, false, true,
      false, false, false
    ]

    imu0_pose_rejection_threshold: 0.8
    imu0_twist_rejection_threshold: 1.5

    # --------------------------------------------------------------------------
    # CONTROL INPUT
    # --------------------------------------------------------------------------
    use_control: false
