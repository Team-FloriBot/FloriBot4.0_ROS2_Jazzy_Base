ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true

    transform_time_offset: 0.0
    transform_timeout: 0.1

    print_diagnostics: true
    debug: false

    publish_tf: true
    publish_acceleration: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: map

    # --------------------------------------------------------------------------
    # RADODOMETRIE
    # --------------------------------------------------------------------------
    odom0: /odom
    odom0_queue_size: 20
    odom0_differential: false
    odom0_relative: false

    # x, y, z,
    # roll, pitch, yaw,
    # vx, vy, vz,
    # vroll, vpitch, vyaw,
    # ax, ay, az
    odom0_config: [
      false, false, false,
      false, false, false,
      true,  true,  false,
      false, false, true,
      false, false, false
    ]

    odom0_pose_rejection_threshold: 5.0
    odom0_twist_rejection_threshold: 2.0

    # --------------------------------------------------------------------------
    # RTK-GPS über navsat_transform_node
    # Optional: Wenn /odometry/gps fehlt, läuft der EKF trotzdem weiter.
    # --------------------------------------------------------------------------
    odom1: /odometry/gps
    odom1_queue_size: 10
    odom1_differential: false
    odom1_relative: false

    # Nur globale x/y-Position aus RTK-GPS
    odom1_config: [
      true,  true,  false,
      false, false, false,
      false, false, false,
      false, false, false,
      false, false, false
    ]

    odom1_pose_rejection_threshold: 1.0
    odom1_twist_rejection_threshold: 1.0

    # --------------------------------------------------------------------------
    # IMU
    # --------------------------------------------------------------------------
    imu0: /imu/data
    imu0_queue_size: 50
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true

    # Nur yaw-rate aus Gyro-Z
    imu0_config: [
      false, false, false,
      false, false, false,
      false, false, false,
      false, false, true,
      false, false, false
    ]

    imu0_pose_rejection_threshold: 0.8
    imu0_twist_rejection_threshold: 1.5

    use_control: false
