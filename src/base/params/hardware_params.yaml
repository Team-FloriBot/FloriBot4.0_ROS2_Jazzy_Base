/**:
  ros__parameters:
    wheel_cmd_topic: /base/wheel_commands4
    wheel_ticks_topic: /base/wheel_ticks4
    articulation_topic: /base/articulation_angle
    joint_state_topic: /floribot/joint_states
    ticks_frame_id: base_link

    # false = bridge the existing FloriBot joint_states interface
    # true  = local closed-loop simulation of encoder ticks from commanded wheel speeds
    simulation_only: false

    ticks_per_rev: 131000.0
    publish_rate_hz: 50.0

    # Existing Advanced_Navigation convention:
    # position[0]   -> articulation angle
    # velocity[1:4] -> FL, FR, RL, RR wheel states
    articulation_position_index: 0
    articulation_joint_name: ""

    front_left_position_index: 1
    front_right_position_index: 2
    rear_left_position_index: 3
    rear_right_position_index: 4

    front_left_velocity_index: 1
    front_right_velocity_index: 2
    rear_left_velocity_index: 3
    rear_right_velocity_index: 4

    # Preferred for long-term robustness if names are available in joint_states.
    # Leave empty to use the explicit indices above.
    front_left_joint_name: ""
    front_right_joint_name: ""
    rear_left_joint_name: ""
    rear_right_joint_name: ""
